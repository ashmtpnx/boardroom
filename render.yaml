# Render Blueprint — deploys BOARDROOM as two services:
#   1. boardroom-server  — Node + Socket.io realtime relay (web service)
#   2. boardroom-web      — Vite static frontend, wired to the server above
#
# Deploy: push to GitHub, then in Render click "New +" > "Blueprint" and pick this repo.
services:
  - type: web
    name: boardroom-server
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGIN
        value: "*"

  - type: web
    name: boardroom-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_REALTIME
        value: socket
      # boardroom-server URL (set after its first deploy)
      - key: VITE_SOCKET_URL
        value: https://boardroom-server-ak8i.onrender.com
      # Firebase Google auth. These web-config values are public by design
      # (security is enforced by Firebase rules + authorized domains), so it's
      # safe to keep them in the blueprint.
      - key: VITE_AUTH
        value: firebase
      - key: VITE_FIREBASE_API_KEY
        value: AIzaSyAB-O9BJYrGVJODZmHdwDfUThjchYO2Ydg
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: boardroom-b5c19.firebaseapp.com
      - key: VITE_FIREBASE_PROJECT_ID
        value: boardroom-b5c19
      - key: VITE_FIREBASE_APP_ID
        value: "1:334105051058:web:598f2bc8385968bfa7eeab"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
